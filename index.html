<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental Mirror Challenge</title>
    <style>
        :root {
            --bg-color: #050505;
            --pad-bg: #111115;
            --accent-color: #3b82f6;
            --mirror-color: #60a5fa;
            --drill-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling/zooming */
            user-select: none; /* Prevents accidental text highlighting */
        }

        /* 3-Panel Layout */
        #game-interface {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Side Control Panels */
        .control-panel {
            width: 20%;
            height: 100%;
            background: var(--pad-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .panel-label {
            position: absolute;
            top: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            text-align: center;
        }
