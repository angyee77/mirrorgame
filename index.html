<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental Mirror Challenge</title>
    <style>
        :root {
            --bg-color: #050505;
            --pad-bg: #111115;
            --accent-color: #3b82f6;
            --mirror-color: #60a5fa;
            --drill-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
        }

        #game-interface {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .control-panel {
            width: 20%;
            height: 100%;
            background: var(--pad-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            touch-action: none;
        }

        /* Sensitivity Controls */
        .settings-container {
            position: absolute;
            top: 20px;
            width: 80%;
            text-align: center;
            pointer-events: auto;
        }

        .panel-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .sensitivity-slider {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .sensitivity-value {
            font-size: 0.7rem;
            color: var(--accent-color);
            margin-top: 4px;
        }

        /* Virtual Joystick Base */
        .joystick-base {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
            margin-top: 40px;
        }

        .joystick-knob {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #mirror-pad .joystick-knob { background: var(--mirror-color); box-shadow: 0 0 15px var(--mirror-color); }
        #drill-pad .joystick-knob { background: var(--drill-color); box-shadow: 0 0 15px var(--drill-color); }

        #viewport {
            width: 60%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #201010 0%, #050505 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .msg-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 20;
            width: 80%;
            max-width: 400px;
        }

        .msg-box h2 { margin-top: 0; color: #fff; }
        .msg-box p { color: #bbb; line-height: 1.5; }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.1s;
        }
        
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-interface">
    <div class="control-panel" id="mirror-pad">
        <div class="settings-container">
            <div class="panel-label">Mirror Sensitivity</div>
            <input type="range" id="mirror-sens" class="sensitivity-slider" min="0" max="100" value="100">
            <div class="sensitivity-value" id="mirror-sens-val">100%</div>
        </div>
        <div class="joystick-base" id="mirror-base">
            <div class="joystick-knob" id="mirror-knob"></div>
        </div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <div class="stats" id="score-display">Cavities Cleared: 0</div>
            <div style="font-size: 0.8rem; opacity: 0.7;">Isometric Surgery V2</div>
        </div>

        <div class="msg-box" id="start-screen" style="display: block;">
            <h2>Dental Operation</h2>
            <p><b>Left Pad:</b> Guide the Mirror<br><b>Right Pad:</b> Guide the Drill</p>
            <p style="font-size: 0.9rem; color: #888;">Note: The drill's movement is inverted inside the reflection!</p>
            <button id="start-btn" class="btn">Commence</button>
        </div>
    </div>

    <div class="control-panel" id="drill-pad">
        <div class="settings-container">
            <div class="panel-label">Drill Sensitivity</div>
            <input type="range" id="drill-sens" class="sensitivity-slider" min="0" max="100" value="100">
            <div class="sensitivity-value" id="drill-sens-val">100%</div>
        </div>
        <div class="joystick-base" id="drill-base">
            <div class="joystick-knob" id="drill-knob"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');
    
    // --- 1. INITIALIZE STATE VARIABLES ---
    let gameActive = false;
    let score = 0;

    const tooth = {
        x: 0, 
        y: 0,
        cavities: []
    };

    // Sensitivity State
    let mirrorSens = 1.0;
    let drillSens = 1.0;

    // --- 2. SET UP RESPONSIVE CANVAS ---
    function resizeCanvas() {
        const rect = viewport.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        if (gameActive) {
            tooth.x = canvas.width / 2;
            tooth.y = canvas.height / 2;
        }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const scoreDisplay = document.getElementById('score-display');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');

    // Joysticks State
    const joysticks = {
        mirror: { id: null, active: false, dX: 0, dY: 0, maxDist: 50 },
        drill: { id: null, active: false, dX: 0, dY: 0, maxDist: 50 }
    };

    // Simulation Objects
    const mirror = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 65,
        baseSpeed: 5
    };

    const drillInput = {
        x: canvas.width / 2 + 100,
        y: canvas.height / 2,
        baseSpeed: 6,
        isDrilling: false
    };

    function generateCavities() {
        tooth.cavities = [];
        for(let i = 0; i < 5; i++) {
            tooth.cavities.push({
                relX: (Math.random() - 0.5) * 70, 
                relY: (Math.random() - 0.5) * 80, 
                radius: 8 + Math.random() * 6,
                health: 100,
                cleared: false
            });
        }
    }

    // --- JOYSTICK LOGIC ---
    function updateJoystick(clientPos, base, knob, stickData) {
        const rect = base.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = clientPos.clientX - centerX;
        let dy = clientPos.clientY - centerY;
        const dist = Math.hypot(dx, dy);

        if (dist > stickData.maxDist) {
            dx = (dx / dist) * stickData.maxDist;
            dy = (dy / dist) * stickData.maxDist;
        }

        stickData.dX = dx / stickData.maxDist;
        stickData.dY = dy / stickData.maxDist;

        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function setupJoystick(padId, baseId, knobId, stickData) {
        const pad = document.getElementById(padId);
        const base = document.getElementById(baseId);
        const knob = document.getElementById(knobId);

        const startDrag = (e) => {
            if (!gameActive) return;
            // Don't trigger if touching sliders
            if(e.target.type === 'range') return;
            
            e.preventDefault();
            stickData.active = true;
            
            if (e.type === 'touchstart') {
                stickData.id = e.changedTouches[0].identifier;
                updateJoystick(e.changedTouches[0], base, knob, stickData);
            } else {
                updateJoystick(e, base, knob, stickData);
            }
        };

        const moveDrag = (e) => {
            if (!stickData.active) return;
            
            if (e.type === 'touchmove') {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === stickData.id) {
                        updateJoystick(e.changedTouches[i], base, knob, stickData);
                        break;
                    }
                }
            } else {
                updateJoystick(e, base, knob, stickData);
            }
        };

        const endDrag = (e) => {
            if (!stickData.active) return;
            
            if (e.type.includes('touch')) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === stickData.id) {
                        resetStick();
                        break;
                    }
                }
            } else {
                resetStick();
            }
        };

        const resetStick = () => {
            stickData.active = false;
            stickData.id = null;
            stickData.dX = 0;
            stickData.dY = 0;
            knob.style.transform = `translate(-50%, -50%)`;
        };

        pad.addEventListener('touchstart', startDrag, {passive: false});
        pad.addEventListener('touchmove', moveDrag, {passive: false});
        pad.addEventListener('touchend', endDrag);
        pad.addEventListener('touchcancel', endDrag);
        pad.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', endDrag);
    }

    setupJoystick('mirror-pad', 'mirror-base', 'mirror-knob', joysticks.mirror);
    setupJoystick('drill-pad', 'drill-base', 'drill-knob', joysticks.drill);

    // --- SENSITIVITY CONTROLS ---
    const mSlider = document.getElementById('mirror-sens');
    const dSlider = document.getElementById('drill-sens');
    const mValLabel = document.getElementById('mirror-sens-val');
    const dValLabel = document.getElementById('drill-sens-val');

    mSlider.addEventListener('input', (e) => {
        mirrorSens = e.target.value / 100;
        mValLabel.innerText = `${e.target.value}%`;
    });

    dSlider.addEventListener('input', (e) => {
        drillSens = e.target.value / 100;
        dValLabel.innerText = `${e.target.value}%`;
    });

    // Prevent slider touches from bubbling to joystick pads
    [mSlider, dSlider].forEach(s => {
        s.addEventListener('touchstart', (e) => e.stopPropagation());
        s.addEventListener('mousedown', (e) => e.stopPropagation());
    });

    // Start Button Event
    startBtn.addEventListener('click', startGame);

    function startGame() {
        gameActive = true;
        startScreen.style.display = 'none';
        score = 0;
        scoreDisplay.innerText = `Cavities Cleared: ${score}`;
        
        tooth.x = canvas.width / 2;
        tooth.y = canvas.height / 2;
        mirror.x = canvas.width / 2;
        mirror.y = canvas.height / 2;
        drillInput.x = canvas.width / 2 + 100;
        drillInput.y = canvas.height / 2;

        generateCavities();
        requestAnimationFrame(update);
    }

    function update() {
        if (!gameActive) return;

        // Apply joystick velocities with sensitivity
        if (joysticks.mirror.active) {
            mirror.x += joysticks.mirror.dX * (mirror.baseSpeed * mirrorSens);
            mirror.y += joysticks.mirror.dY * (mirror.baseSpeed * mirrorSens);
        }

        mirror.x = Math.max(mirror.radius, Math.min(canvas.width - mirror.radius, mirror.x));
        mirror.y = Math.max(mirror.radius, Math.min(canvas.height - mirror.radius, mirror.y));

        if (joysticks.drill.active) {
            drillInput.x += joysticks.drill.dX * (drillInput.baseSpeed * drillSens);
            drillInput.y += joysticks.drill.dY * (drillInput.baseSpeed * drillSens);
        }
        drillInput.isDrilling = joysticks.drill.active;

        const drillRenderX = tooth.x - (drillInput.x - tooth.x);
        const drillRenderY = tooth.y - (drillInput.y - tooth.y);

        let allCleared = true;
        const isoSquash = 0.6; 
        
        tooth.cavities.forEach(c => {
            if(!c.cleared) {
                const cx = tooth.x + c.relX;
                const cy = tooth.y + (c.relY * isoSquash) - 40; 
                
                const distToMirror = Math.hypot(drillRenderX - mirror.x, drillRenderY - mirror.y);
                const distToCavity = Math.hypot(drillRenderX - cx, drillRenderY - cy);

                if (distToMirror < mirror.radius && distToCavity < c.radius && drillInput.isDrilling) {
                    c.health -= 2.0;
                    if(c.health <= 0) {
                        c.cleared = true;
                        score++;
                        scoreDisplay.innerText = `Cavities Cleared: ${score}`;
                    }
                    createParticles(drillRenderX, drillRenderY);
                }
                allCleared = false;
            }
        });

        if(allCleared) generateCavities();

        draw(drillRenderX, drillRenderY);
        updateParticles();
        requestAnimationFrame(update);
    }

    // --- Drawing Functions ---
    const isoScaleY = 0.6;
    const toothHeight = 40;

    function draw(drX, drY) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.globalAlpha = 0.1;
        drawToothIso(ctx, tooth.x, tooth.y, false);
        ctx.globalAlpha = 1.0;

        drawDrillIso(ctx, drillInput.x, drillInput.y);

        ctx.save();
        ctx.beginPath();
        ctx.arc(mirror.x, mirror.y, mirror.radius, 0, Math.PI * 2);
        ctx.clip();

        ctx.fillStyle = '#151212';
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        drawToothIso(ctx, tooth.x, tooth.y, true);
        drawParticles(ctx);
        drawDrillIso(ctx, drX, drY);

        ctx.restore();

        ctx.strokeStyle = '#aab2b8';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(mirror.x, mirror.y, mirror.radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(mirror.x, mirror.y, mirror.radius - 5, 0, Math.PI * 2);
        ctx.stroke();

        const targetX = -100; 
        const targetY = canvas.height + 100;
        const angle = Math.atan2(targetY - mirror.y, targetX - mirror.x);
        
        const handleStartX = mirror.x + Math.cos(angle) * (mirror.radius + 2);
        const handleStartY = mirror.y + Math.sin(angle) * (mirror.radius + 2);
        
        ctx.beginPath();
        ctx.moveTo(handleStartX, handleStartY);
        ctx.lineTo(handleStartX + Math.cos(angle) * 1000, handleStartY + Math.sin(angle) * 1000); 
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 14;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    function drawMolarPath(context, x, y) {
        context.beginPath();
        context.moveTo(x - 50, y - 60 * isoScaleY);
        context.quadraticCurveTo(x, y - 75 * isoScaleY, x + 50, y - 60 * isoScaleY);
        context.quadraticCurveTo(x + 65, y, x + 50, y + 60 * isoScaleY);
        context.quadraticCurveTo(x, y + 75 * isoScaleY, x - 50, y + 60 * isoScaleY);
        context.quadraticCurveTo(x - 65, y, x - 50, y - 60 * isoScaleY);
        context.closePath();
    }

    function drawFissures(context, x, y, isBright) {
        context.beginPath();
        context.moveTo(x - 35, y);
        context.lineTo(x + 35, y);
        context.moveTo(x, y - 40 * isoScaleY);
        context.lineTo(x, y + 40 * isoScaleY);
        
        context.moveTo(x - 15, y);
        context.lineTo(x - 30, y - 30 * isoScaleY);
        context.moveTo(x + 15, y);
        context.lineTo(x + 30, y + 30 * isoScaleY);

        context.strokeStyle = isBright ? 'rgba(0, 0, 0, 0.15)' : 'rgba(0, 0, 0, 0.5)';
        context.lineWidth = 3;
        context.lineCap = 'round';
        context.stroke();
    }

    function drawToothIso(context, x, y, isBright) {
        context.fillStyle = isBright ? '#a3a3a3' : '#333';
        drawMolarPath(context, x, y);
        context.fill();

        if (isBright) {
            context.fillStyle = '#8f8f8f';
            context.beginPath();
            context.moveTo(x - 60, y + 10 * isoScaleY);
            context.lineTo(x + 60, y + 10 * isoScaleY);
            context.lineTo(x + 60, y - toothHeight + 10 * isoScaleY);
            context.lineTo(x - 60, y - toothHeight + 10 * isoScaleY);
            context.fill();
        }

        context.fillStyle = isBright ? '#fcfcfc' : '#555';
        drawMolarPath(context, x, y - toothHeight);
        context.fill();

        drawFissures(context, x, y - toothHeight, isBright);

        tooth.cavities.forEach(c => {
            if(!c.cleared) {
                context.fillStyle = isBright ? `rgba(60, 30, 10, ${c.health/100})` : '#222';
                const cavX = x + c.relX;
                const cavY = y + (c.relY * isoScaleY) - toothHeight;
                context.beginPath();
                context.ellipse(cavX, cavY, c.radius, c.radius * isoScaleY, 0, 0, Math.PI*2);
                context.fill();
            }
        });
    }

    function drawDrillIso(context, x, y) {
        context.save();
        context.translate(x, y);
        context.rotate(-Math.PI / 8); 

        context.fillStyle = '#555';
        context.fillRect(-7, -140, 14, 120);
        
        const hg = context.createLinearGradient(-12, -20, 12, -20);
        hg.addColorStop(0, '#888'); hg.addColorStop(0.5, '#eee'); hg.addColorStop(1, '#888');
        context.fillStyle = hg;
        
        context.beginPath();
        context.moveTo(-10, -20); 
        context.lineTo(10, -20);
        context.lineTo(2, 0); 
        context.lineTo(-2, 0);
        context.closePath();
        context.fill();

        if(drillInput.isDrilling) {
            context.strokeStyle = 'rgba(255,255,255,0.7)';
            context.lineWidth = 1.5;
            context.beginPath();
            context.ellipse(0, -10, 10, 4, 0, 0, Math.PI*2);
            context.stroke();
        }
        context.restore();
    }

    let particles = [];
    function createParticles(x, y) {
        for(let i=0; i<3; i++) {
            particles.push({
                x: x, 
                y: y - 5,
                vx: (Math.random()-0.5) * 8,
                vy: (Math.random()-0.5) * 8 - 2,
                life: 1.0,
                size: Math.random() * 3 + 1
            });
        }
    }
    function updateParticles() {
        particles.forEach(p => { 
            p.x += p.vx; 
            p.y += p.vy; 
            p.vy += 0.2; 
            p.life -= 0.05; 
        });
        particles = particles.filter(p => p.life > 0);
    }
    function drawParticles(context) {
        particles.forEach(p => {
            context.globalAlpha = p.life;
            context.fillStyle = '#fff';
            context.beginPath(); 
            context.arc(p.x, p.y, p.size, 0, Math.PI*2); 
            context.fill();
        });
        context.globalAlpha = 1.0;
    }
</script>
</body>
</html>
