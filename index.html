<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dental Mirror Challenge - Upper Arch Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --pad-bg: #111115;
            --accent-color: #3b82f6;
            --mirror-color: #60a5fa;
            --drill-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
        }

        #game-interface {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .control-panel {
            width: 20%;
            height: 100%;
            background: var(--pad-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .settings-container {
            position: absolute;
            top: 20px;
            width: 85%;
            text-align: center;
            z-index: 25;
        }

        .panel-label {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .sensitivity-slider {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .sensitivity-value {
            font-size: 0.7rem;
            color: var(--accent-color);
            margin-top: 4px;
        }

        .joystick-base {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
            margin-top: 60px;
            pointer-events: none; /* Let the pad handle events */
        }

        .joystick-knob {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #mirror-pad .joystick-knob { background: var(--mirror-color); box-shadow: 0 0 15px var(--mirror-color); }
        #drill-pad .joystick-knob { background: var(--drill-color); box-shadow: 0 0 15px var(--drill-color); }

        #viewport {
            width: 60%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #2a1515 0%, #050505 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15;
        }

        .stats { font-size: 1.1rem; font-weight: bold; color: #fff; }

        .msg-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
            width: 80%;
            max-width: 400px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="game-interface">
    <div class="control-panel" id="mirror-pad">
        <div class="settings-container">
            <div class="panel-label">Mirror Sens</div>
            <input type="range" id="mirror-sens" class="sensitivity-slider" min="0" max="100" value="100">
            <div class="sensitivity-value" id="mirror-sens-val">100%</div>
        </div>
        <div class="joystick-base" id="mirror-base"><div class="joystick-knob" id="mirror-knob"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div class="stats" id="score-display">Cavities Cleared: 0</div>
            <div style="font-size: 0.7rem; opacity: 0.7;">Anatomical Arch V3.1</div>
        </div>
        <div class="msg-box" id="start-screen">
            <h2>Upper Arch Training</h2>
            <p>Guide the mirror to see the reflection.<br>Drill the irregular cavities.</p>
            <button id="start-btn" class="btn">Commence</button>
        </div>
    </div>

    <div class="control-panel" id="drill-pad">
        <div class="settings-container">
            <div class="panel-label">Drill Sens</div>
            <input type="range" id="drill-sens" class="sensitivity-slider" min="0" max="100" value="100">
            <div class="sensitivity-value" id="drill-sens-val">100%</div>
        </div>
        <div class="joystick-base" id="drill-base"><div class="joystick-knob" id="drill-knob"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');
    
    let gameActive = false;
    let score = 0;
    let mirrorSens = 1.0;
    let drillSens = 1.0;

    const arch = { teeth: [] };
    const joysticks = {
        mirror: { id: null, active: false, dX: 0, dY: 0, maxDist: 50 },
        drill: { id: null, active: false, dX: 0, dY: 0, maxDist: 50 }
    };

    const mirror = { x: 0, y: 0, radius: 95, baseSpeed: 5 };
    const drillInput = { x: 0, y: 0, baseSpeed: 6, isDrilling: false };

    function initArch() {
        arch.teeth = [];
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 + 60;
        const a = canvas.width * 0.25; 
        const b = canvas.height * 0.35; 

        for (let i = 0; i < 14; i++) {
            const t = (i / 13) * Math.PI - Math.PI; 
            const tx = centerX + a * Math.cos(t);
            const ty = centerY + b * Math.sin(t);
            let type = (i >= 5 && i <= 8) ? "anterior" : (i === 4 || i === 9 || i === 3 || i === 10) ? "premolar" : "molar";
            arch.teeth.push({ x: tx, y: ty, type: type, cavities: [] });
        }
        generateCavities();
    }

    function generateCavities() {
        arch.teeth.forEach(t => t.cavities = []);
        for (let i = 0; i < 2; i++) {
            const randomTooth = arch.teeth[Math.floor(Math.random() * arch.teeth.length)];
            const points = [];
            const numPoints = 10;
            const baseRad = 10 + Math.random() * 8;
            for (let p = 0; p < numPoints; p++) {
                const angle = (p / numPoints) * Math.PI * 2;
                const r = baseRad * (0.6 + Math.random() * 0.8);
                points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
            }
            randomTooth.cavities.push({ points, health: 100, cleared: false, radius: baseRad });
        }
    }

    function updateJoystick(clientPos, base, knob, stickData) {
        const rect = base.getBoundingClientRect();
        const dx = clientPos.clientX - (rect.left + rect.width / 2);
        const dy = clientPos.clientY - (rect.top + rect.height / 2);
        const dist = Math.min(Math.hypot(dx, dy), stickData.maxDist);
        const angle = Math.atan2(dy, dx);
        const finalX = Math.cos(angle) * dist;
        const finalY = Math.sin(angle) * dist;
        stickData.dX = finalX / stickData.maxDist;
        stickData.dY = finalY / stickData.maxDist;
        knob.style.transform = `translate(calc(-50% + ${finalX}px), calc(-50% + ${finalY}px))`;
    }

    function setupJoystick(padId, baseId, knobId, stickData) {
        const pad = document.getElementById(padId);
        const base = document.getElementById(baseId);
        const knob = document.getElementById(knobId);

        const start = (e) => {
            if (!gameActive || e.target.type === 'range') return;
            e.preventDefault();
            stickData.active = true;
            const touch = e.type === 'touchstart' ? e.changedTouches[0] : e;
            if (e.type === 'touchstart') stickData.id = touch.identifier;
            updateJoystick(touch, base, knob, stickData);
        };

        const move = (e) => {
            if (!stickData.active) return;
            let touch;
            if (e.type === 'touchmove') {
                touch = Array.from(e.changedTouches).find(t => t.identifier === stickData.id);
            } else { touch = e; }
            if (touch) updateJoystick(touch, base, knob, stickData);
        };

        const end = () => {
            stickData.active = false;
            stickData.dX = 0; stickData.dY = 0;
            knob.style.transform = `translate(-50%, -50%)`;
        };

        pad.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', end);
        pad.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
    }

    setupJoystick('mirror-pad', 'mirror-base', 'mirror-knob', joysticks.mirror);
    setupJoystick('drill-pad', 'drill-base', 'drill-knob', joysticks.drill);

    document.getElementById('mirror-sens').oninput = (e) => {
        mirrorSens = e.target.value / 100;
        document.getElementById('mirror-sens-val').innerText = e.target.value + '%';
    };
    document.getElementById('drill-sens').oninput = (e) => {
        drillSens = e.target.value / 100;
        document.getElementById('drill-sens-val').innerText = e.target.value + '%';
    };

    function startGame() {
        gameActive = true;
        document.getElementById('start-screen').style.display = 'none';
        resize();
        mirror.x = canvas.width / 2; mirror.y = canvas.height / 2;
        drillInput.x = canvas.width / 2 + 40; drillInput.y = canvas.height / 2 + 40;
        requestAnimationFrame(update);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);

    function update() {
        if (!gameActive) return;

        if (joysticks.mirror.active) {
            mirror.x += joysticks.mirror.dX * (mirror.baseSpeed * mirrorSens);
            mirror.y += joysticks.mirror.dY * (mirror.baseSpeed * mirrorSens);
        }
        if (joysticks.drill.active) {
            drillInput.x += joysticks.drill.dX * (drillInput.baseSpeed * drillSens);
            drillInput.y += joysticks.drill.dY * (drillInput.baseSpeed * drillSens);
        }
        drillInput.isDrilling = joysticks.drill.active;

        const dRX = (canvas.width / 2) - (drillInput.x - (canvas.width / 2));
        const dRY = (canvas.height / 2) - (drillInput.y - (canvas.height / 2));

        let currentCavities = 0;
        arch.teeth.forEach(tooth => {
            tooth.cavities.forEach(c => {
                if (!c.cleared) {
                    currentCavities++;
                    const distMirror = Math.hypot(dRX - mirror.x, dRY - mirror.y);
                    const distDrill = Math.hypot(dRX - tooth.x, dRY - tooth.y);
                    if (distMirror < mirror.radius && distDrill < c.radius + 8 && drillInput.isDrilling) {
                        c.health -= 1.8;
                        createParticles(dRX, dRY);
                        if (c.health <= 0) {
                            c.cleared = true; score++;
                            document.getElementById('score-display').innerText = `Cavities Cleared: ${score}`;
                        }
                    }
                }
            });
        });

        if (currentCavities === 0) generateCavities();
        draw(dRX, dRY);
        requestAnimationFrame(update);
    }

    function drawTooth(c, x, y, type, isBright, cavities) {
        c.save(); c.translate(x, y);
        c.fillStyle = isBright ? '#f8f8f8' : '#2a2a2a';
        c.beginPath();
        if (type === "anterior") {
            c.moveTo(-15, -22); c.quadraticCurveTo(0, -28, 15, -22);
            c.lineTo(12, 18); c.quadraticCurveTo(0, 24, -12, 18);
        } else {
            const size = type === "molar" ? 22 : 18;
            c.roundRect(-size, -size, size*2, size*2, 8);
        }
        c.fill();
        c.strokeStyle = isBright ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
        c.stroke();

        cavities.forEach(cav => {
            if (!cav.cleared) {
                c.fillStyle = isBright ? `rgba(60, 30, 10, ${cav.health/100})` : '#111';
                c.beginPath(); c.moveTo(cav.points[0].x, cav.points[0].y);
                cav.points.forEach(p => c.lineTo(p.x, p.y));
                c.closePath(); c.fill();
            }
        });
        c.restore();
    }

    function draw(dRX, dRY) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        arch.teeth.forEach(t => drawTooth(ctx, t.x, t.y, t.type, false, t.cavities));
        
        ctx.save();
        ctx.beginPath(); ctx.arc(mirror.x, mirror.y, mirror.radius, 0, Math.PI * 2); ctx.clip();
        ctx.fillStyle = '#1e1b1b'; ctx.fillRect(0,0, canvas.width, canvas.height);
        arch.teeth.forEach(t => drawTooth(ctx, t.x, t.y, t.type, true, t.cavities));
        drawDrill(ctx, dRX, dRY);
        updateParticles(); drawParticles(ctx);
        ctx.restore();

        ctx.strokeStyle = '#999'; ctx.lineWidth = 10;
        ctx.beginPath(); ctx.arc(mirror.x, mirror.y, mirror.radius, 0, Math.PI * 2); ctx.stroke();
        drawDrill(ctx, drillInput.x, drillInput.y);
    }

    function drawDrill(c, x, y) {
        c.save(); c.translate(x, y); c.rotate(-Math.PI/4);
        c.fillStyle = '#444'; c.fillRect(-4, -90, 8, 80);
        c.fillStyle = '#bbb';
        c.beginPath(); c.moveTo(-10, -10); c.lineTo(10, -10); c.lineTo(0, 8); c.fill();
        if (drillInput.isDrilling) {
            c.strokeStyle = 'rgba(255,255,255,0.6)'; c.beginPath(); c.arc(0,0, 14, 0, Math.PI*2); c.stroke();
        }
        c.restore();
    }

    let particles = [];
    function createParticles(x, y) {
        for(let i=0; i<2; i++) particles.push({x, y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, l:1});
    }
    function updateParticles() {
        particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.l-=0.06; });
        particles = particles.filter(p => p.l > 0);
    }
    function drawParticles(c) {
        particles.forEach(p => { c.fillStyle=`rgba(255,255,255,${p.l})`; c.fillRect(p.x, p.y, 2, 2); });
    }

    function resize() {
        canvas.width = viewport.clientWidth;
        canvas.height = viewport.clientHeight;
        initArch();
    }
    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
